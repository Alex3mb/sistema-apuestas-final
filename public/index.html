<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Sistema de Apuestas 5 vs 5</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background: #f5f5f5;
      }
      h1 {
        color: #333;
        border-bottom: 2px solid #4caf50;
        padding-bottom: 10px;
      }
      button {
        cursor: pointer;
        transition: opacity 0.3s;
      }
      button:hover {
        opacity: 0.8;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      th {
        background: #4caf50;
        color: white;
        padding: 12px;
      }
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }
      tr:hover {
        background: #f5f5f5;
      }
      input[type="text"],
      input[type="number"] {
        padding: 5px;
        border: 1px solid #ddd;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1>🎲 Sistema de Apuestas 5 vs 5</h1>

    <div
      style="
        margin: 20px 0;
        padding: 20px;
        background: white;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      "
    >
      <h2>Registrar Nuevo Jugador</h2>
      <input
        type="text"
        id="nombreJugador"
        placeholder="Nombre del jugador"
        style="width: 300px; padding: 8px"
      />
      <button
        onclick="registrar()"
        style="
          background: #4caf50;
          color: white;
          padding: 8px 20px;
          border: none;
          border-radius: 3px;
          margin-left: 10px;
        "
      >
        Registrar
      </button>
    </div>

    <h2>Jugadores Registrados</h2>
    <div id="listaJugadores"></div>

    <!-- Modal para editar jugador -->
    <div
      id="modalEditar"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        z-index: 1000;
        min-width: 300px;
      "
    >
      <h3 style="margin-top: 0">✏️ Editar Jugador</h3>
      <input type="hidden" id="editarId" />
      <label>Nombre:</label><br />
      <input
        type="text"
        id="editarNombre"
        style="width: 100%; padding: 5px; margin-bottom: 10px"
      /><br />
      <label>Saldo:</label><br />
      <input
        type="number"
        id="editarSaldo"
        step="any"
        style="width: 100%; padding: 5px; margin-bottom: 10px"
      /><br />
      <label>Estado:</label><br />
      <select
        id="editarEstado"
        style="width: 100%; padding: 5px; margin-bottom: 15px"
      >
        <option value="1">🟢 Activo</option>
        <option value="0">🔴 Inactivo</option></select
      ><br />
      <div style="text-align: right">
        <button
          onclick="guardarCambios()"
          style="
            background: #4caf50;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          Guardar
        </button>
        <button
          onclick="cerrarModal()"
          style="
            background: #f44336;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          Cancelar
        </button>
      </div>
    </div>

    <!-- Fondo oscuro para modal -->
    <div
      id="fondoModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      "
      onclick="cerrarModal()"
    ></div>

    <h2 style="margin-top: 30px">Ronda Actual (Sistema anterior)</h2>
    <button
      onclick="ganador()"
      style="
        background: #ff9800;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
      "
    >
      Calcular Ronda Simple
    </button>

    <script src="js/app.js"></script>
  </body>
</html>
